name: Wonder Watch Enterprise CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  AZURE_WEBAPP_NAME: 'wonderwatch-prod'
  AZURE_WEBAPP_PACKAGE_PATH: './publish'
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20.x'

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET Core SDK ${{ env.DOTNET_VERSION }}
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Setup Node.js ${{ env.NODE_VERSION }} (For Tailwind CSS)
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Install NPM Dependencies & Build Tailwind CSS
      working-directory: ./WonderWatch.Web
      run: |
        npm ci
        npm run build:css

    - name: Restore .NET Dependencies
      run: dotnet restore WonderWatch.sln

    - name: Build .NET Solution
      run: dotnet build WonderWatch.sln --configuration Release --no-restore

    - name: Run xUnit Tests
      run: dotnet test WonderWatch.sln --configuration Release --no-build --verbosity normal

    - name: Publish Web Project
      run: dotnet publish WonderWatch.Web/WonderWatch.Web.csproj --configuration Release --no-build --output ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

    - name: Check Azure Credentials
      id: azure-creds
      run: |
        if [ -n "$PUBLISH_PROFILE" ]; then
          echo "available=true" >> $GITHUB_OUTPUT
          echo "✅ Azure publish profile found. Deployment will proceed."
        else
          echo "available=false" >> $GITHUB_OUTPUT
          echo "⚠️ Azure publish profile not configured. Skipping deployment."
        fi
      env:
        PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}

    - name: Deploy to Azure Web App
      if: github.ref == 'refs/heads/main' && github.event_name == 'push' && steps.azure-creds.outputs.available == 'true'
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}